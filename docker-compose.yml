services:
  postgres:
    image: postgres:16-alpine
    container_name: fincore-postgres
    environment:
      POSTGRES_DB: ${FINCORE_DB_NAME:?FINCORE_DB_NAME is required}
      POSTGRES_USER: ${FINCORE_DB_USER:?FINCORE_DB_USER is required}
      POSTGRES_PASSWORD: ${FINCORE_DB_PASSWORD:?FINCORE_DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - fincore-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fincore-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - fincore-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fincore-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:29092 1 30"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - fincore-network

  fincore:
    build:
      context: .
      dockerfile: Dockerfile
    image: fincore:local
    container_name: fincore-app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      FINCORE_DB_URL: ${FINCORE_DB_URL:?FINCORE_DB_URL is required}
      FINCORE_DB_USER: ${FINCORE_DB_USER:?FINCORE_DB_USER is required}
      FINCORE_DB_PASSWORD: ${FINCORE_DB_PASSWORD:?FINCORE_DB_PASSWORD is required}
      FINCORE_KAFKA_BOOTSTRAP: ${FINCORE_KAFKA_BOOTSTRAP:?FINCORE_KAFKA_BOOTSTRAP is required}
      FINCORE_API_KEY_WRITE: ${FINCORE_API_KEY_WRITE:?FINCORE_API_KEY_WRITE is required}
      FINCORE_API_KEY_READ_ONLY: ${FINCORE_API_KEY_READ_ONLY:?FINCORE_API_KEY_READ_ONLY is required}
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health/readiness > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - fincore-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: fincore-prometheus
    depends_on:
      fincore:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - fincore-network

  grafana:
    image: grafana/grafana:11.2.2
    container_name: fincore-grafana
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - fincore-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  fincore-network:
    driver: bridge
