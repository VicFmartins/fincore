name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify project compiles
        run: mvn -B -ntp -pl infrastructure -am -DskipTests compile

      - name: Run tests
        run: mvn -B -ntp -pl infrastructure -am test

      - name: Build application package
        run: mvn -B -ntp -pl infrastructure -am -DskipTests package

      - name: Build Docker image
        run: docker build -t fincore:ci .
