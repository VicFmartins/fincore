spring:
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    consumer:
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg %kvp%n"

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        readiness:
          include: readinessState,db,kafkaConnectivity
        liveness:
          include: livenessState
  health:
    db:
      enabled: true
    kafka:
      enabled: false
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    enable:
      kafka: false
    tags:
      application: fincore

fincore:
  kafka:
    topics:
      transaction-completed: ${FINCORE_TRANSACTION_COMPLETED_TOPIC:transaction.completed}
    consumer:
      transaction-completed:
        group-id: ${FINCORE_TRANSACTION_COMPLETED_CONSUMER_GROUP:fincore-transaction-completed}
  outbox:
    batch-size: ${FINCORE_OUTBOX_BATCH:50}
    fixed-delay: ${FINCORE_OUTBOX_DELAY_MS:2000}
    initial-delay: ${FINCORE_OUTBOX_INITIAL_DELAY_MS:1000}
